# 中国移动APP / 移动营业厅签到

[rewrite_local]
# 保存 refreshSession 会话；这条就是老板当前抓到的接口
^https:\/\/client\.app\.coc\.10086\.cn\/biz-orange\/DN\/refreshSession url script-request-body https://raw.githubusercontent.com/eleven252412/cmcc-app-checkin-quanx/main/cmcc-app-checkin-quanx.js

# 保存签到状态和奖品查询接口；这两个已验证可以返回 SUCCESS
^https:\/\/wx\.10086\.cn\/qwhdhub\/api\/mark\/mark31\/markstatus url script-request-body https://raw.githubusercontent.com/eleven252412/cmcc-app-checkin-quanx/main/cmcc-app-checkin-quanx.js
^https:\/\/wx\.10086\.cn\/qwhdhub\/api\/mark\/info\/businessPrizes url script-request-body https://raw.githubusercontent.com/eleven252412/cmcc-app-checkin-quanx/main/cmcc-app-checkin-quanx.js

# 保存疑似签到/领取/任务接口；手动点一次签到后，脚本会保存真实请求用于定时重放
^https:\/\/[^\/]*10086\.cn\/.*(sign|signin|checkin|mark|qwhd|businessPrizes|draw|receive|reward|task|finish|complete|lottery|activity|coupon|point|score|rights|welfare|benefit|daily).* url script-request-body https://raw.githubusercontent.com/eleven252412/cmcc-app-checkin-quanx/main/cmcc-app-checkin-quanx.js

[task_local]
30 8 * * * https://raw.githubusercontent.com/eleven252412/cmcc-app-checkin-quanx/main/cmcc-app-checkin-quanx.js, tag=中国移动APP签到, enabled=true

[mitm]
hostname = client.app.coc.10086.cn, *.10086.cn
